# XcodeGen — run on Codemagic (macOS) to produce FireballNative.xcodeproj. No local Mac required.
# https://github.com/yonaskolb/XcodeGen
name: FireballNative
options:
  bundleIdPrefix: com.fireball
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: 0.4.8
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  FireballNative:
    type: application
    platform: iOS
    sources:
      - path: FireballNative
    dependencies:
      - package: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fireball.nativeapp
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    info:
      path: FireballNative/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
