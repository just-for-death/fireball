org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
# Android Lint's embedded UAST stack can crash when the Gradle daemon runs on JDK 26+.
# If `:app:lintDebug` fails inside AndroidLintWorkAction, run with JDK 21 or 17, e.g.
#   JAVA_HOME=/usr/lib/jvm/java-21-openjdk ./gradlew :app:lintDebug
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
