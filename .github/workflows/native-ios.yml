name: Native iOS Core

on:
  push:
    paths:
      - "native/ios/**"
      - ".github/workflows/native-ios.yml"
  pull_request:
    paths:
      - "native/ios/**"
      - ".github/workflows/native-ios.yml"

jobs:
  linux-core:
    name: Linux — Swift Core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/ios
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Verify Core on Linux
        run: ./scripts/verify-linux.sh

  macos-core:
    name: macOS — Core + YouTubeKit
    runs-on: macos-14
    defaults:
      run:
        working-directory: native/ios
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Build Core with YouTubeKit
        run: swift build --target FireballNativeCore -c debug
      - name: Test
        run: swift test --filter FireballNativeCoreTests -c debug
