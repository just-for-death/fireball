name: fireball
description: "Fireball — your music, anywhere."
publish_to: "none"
version: 3.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Audio (media_kit + libmpv per platform — without *_libs_*, stub plugins break playback)
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_linux: ^1.2.1
  audio_service: ^0.18.15
  audio_session: ^0.1.25

  # State
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Networking & persistence
  http: ^1.2.2
  path_provider: ^2.1.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Google Drive sync
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0

  # WebDAV / Nextcloud sync
  webdav_client: ^1.2.1

  # Remote control QR code
  qr_flutter: ^4.1.0

  # UI
  flex_color_scheme: ^8.2.0
  dynamic_color: ^1.7.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  package_info_plus: ^9.0.1
  audio_service_mpris: ^0.2.1
  mobile_scanner: ^7.2.0
  file_picker: ^11.0.2
  home_widget: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_native_splash:
  color: "#050505"
  color_dark: "#050505"
  image: assets/icon.png
  image_dark: assets/icon.png
  android_12:
    image: assets/icon.png
    color: "#050505"
    icon_background_color: "#050505"

# Launcher icons: Android uses adaptive layers (circle / squircle / rounded-rect masks).
# Foreground inset keeps the mark inside the safe zone on all OEM shapes.
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  linux: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"
  image_path_ios: "assets/icon.png"
  background_color_ios: "#050505"
  # Adaptive (API 26+): background color + foreground; inset % = safe zone padding
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#050505"
  adaptive_icon_foreground_inset: 22
  # Android 13+ themed / monochrome launcher icon
  adaptive_icon_monochrome: "assets/icon-monochrome.png"
