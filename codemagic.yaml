# Codemagic CI/CD — Fireball unsigned iOS IPA only
# Marketing version: FLUTTER_BUILD_NAME (5.0.0). Build number: CM_BUILD_NUMBER.
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# No Apple signing / TestFlight upload is configured in this file.
#
# Monorepo: if this file lives above the Flutter app, add to the workflow:
#   working_directory: fireball
#
# Unsigned IPA: use workflow `fireball-ios-unsigned-ipa` (no Apple signing; artifact is not
# installable on real devices until you sign it yourself).

workflows:
  fireball-ios-unsigned-ipa:
    name: Fireball iOS unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_BUILD_NAME: "5.0.0"
    scripts:
      - name: Build unsigned iOS app and package IPA
        script: |
          set -e
          export FLUTTER_BUILD_NAME="${FLUTTER_BUILD_NAME:-5.0.0}"
          export FLUTTER_BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          ./scripts/build_unsigned_ipa.sh "build/ios/ipa_unsigned/fireball_unsigned.ipa"

    artifacts:
      - build/ios/ipa_unsigned/fireball_unsigned.ipa

  # SwiftUI native app (native/ios) — InnerTube + YouTubeKit fallback; no local Mac needed.
  fireball-native-ios:
    name: Fireball Native iOS (Swift)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build native Fireball iOS app
        script: |
          set -e
          cd native/ios
          chmod +x scripts/build-ios-codemagic.sh
          ./scripts/build-ios-codemagic.sh "generic/platform=iOS Simulator"
    artifacts:
      - native/ios/build/DerivedData/**/*.app
