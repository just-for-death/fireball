# Codemagic CI/CD — Fireball 6.0 native (Kotlin + Swift)
# Marketing version: FIREBALL_VERSION (6.0.0). Build number: CM_BUILD_NUMBER.
#
# Docs: https://docs.codemagic.io/yaml-quick-start/yaml-getting-started/
#
# Workflows:
#   fireball-android-release  — release APK from native/android
#   fireball-native-ios       — XcodeGen + build (simulator or device destination)
#   fireball-ios-unsigned-ipa — unsigned .ipa for sideloading (macOS only; sign locally)

workflows:
  fireball-android-release:
    name: Fireball 6.0 Android APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      java: 21
      vars:
        FIREBALL_VERSION: "6.0.0"
    scripts:
      - name: Build release APK
        script: |
          set -e
          export FIREBALL_VERSION="${FIREBALL_VERSION:-6.0.0}"
          export FIREBALL_BUILD_NUMBER="${CM_BUILD_NUMBER:-600}"
          ./scripts/build_native_apk.sh
    artifacts:
      - native/android/app/build/outputs/apk/release/*.apk

  fireball-native-ios:
    name: Fireball 6.0 Native iOS (Swift)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        FIREBALL_VERSION: "6.0.0"
    scripts:
      - name: Build native Fireball iOS app
        script: |
          set -e
          export FIREBALL_VERSION="${FIREBALL_VERSION:-6.0.0}"
          export FIREBALL_BUILD_NUMBER="${CM_BUILD_NUMBER:-600}"
          cd native/ios
          chmod +x scripts/build-ios-codemagic.sh
          ./scripts/build-ios-codemagic.sh "generic/platform=iOS Simulator"
    artifacts:
      - native/ios/build/DerivedData/**/*.app

  fireball-ios-unsigned-ipa:
    name: Fireball 6.0 iOS unsigned IPA
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        FIREBALL_VERSION: "6.0.0"
    scripts:
      - name: Package unsigned IPA
        script: |
          set -e
          export FIREBALL_VERSION="${FIREBALL_VERSION:-6.0.0}"
          export FIREBALL_BUILD_NUMBER="${CM_BUILD_NUMBER:-600}"
          ./scripts/build_native_unsigned_ipa.sh "dist/Fireball-${FIREBALL_VERSION}-ios-unsigned.ipa"
    artifacts:
      - dist/Fireball-*-ios-unsigned.ipa
