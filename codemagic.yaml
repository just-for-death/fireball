# Codemagic CI/CD — Fireball v3.0.x
# Marketing version: FLUTTER_BUILD_NAME (3.0.0). Build number: CM_BUILD_NUMBER or ASC (signed IPA).
# Typical order: run `fireball-ios-unsigned-ipa` or `fireball-ios-ipa`, then `fireball-android-apk`.
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#       https://docs.codemagic.io/yaml-code-signing/signing-ios/
#       https://docs.codemagic.io/yaml-publishing/app-store-connect/
#
# Setup (Codemagic UI):
# 1. Team integrations → Developer Portal → add App Store Connect API key (App Manager).
# 2. Code signing identities → ensure App Store distribution cert + profile for bundle id
#    com.fireball.fireball (or use automatic fetch after step 1).
# 3. In Team integrations, name your App Store Connect key e.g. `fireball-asc` — it must match
#    `app_store_connect` under workflow `fireball-ios-ipa` (or change that line to your name).
# 4. Optional: in Codemagic app Environment variables, set APP_STORE_APPLE_ID to your app’s
#    numeric Apple ID (App Store Connect → App → General) for ASC-based build numbering.
#
# Monorepo: if this file lives above the Flutter app, add to the workflow:
#   working_directory: fireball
#
# Unsigned IPA: use workflow `fireball-ios-unsigned-ipa` (no Apple signing; artifact is not
# installable on real devices until you sign it yourself).
#
# Android APK: workflow `fireball-android-apk` — release APK (add android_signing + keystore in
# Codemagic for Play Store–style signing; project currently uses debug signing for release).

workflows:
  fireball-android-apk:
    name: Fireball Android APK
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        FLUTTER_BUILD_NAME: "3.0.0"
    scripts:
      - name: Install dependencies
        script: |
          set -e
          flutter pub get

      - name: Build release APK
        script: |
          set -e
          VERSION_NAME="${FLUTTER_BUILD_NAME:-3.0.0}"
          BN="${CM_BUILD_NUMBER:-1}"
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BN"

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  fireball-ios-unsigned-ipa:
    name: Fireball iOS unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        FLUTTER_BUILD_NAME: "3.0.0"
    scripts:
      - name: Install dependencies
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install

      - name: Build unsigned iOS app and package IPA
        script: |
          set -e
          VERSION_NAME="${FLUTTER_BUILD_NAME:-3.0.0}"
          BN="${CM_BUILD_NUMBER:-1}"

          flutter build ios --release --no-codesign \
            --build-name="$VERSION_NAME" \
            --build-number="$BN"

          APP="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP" ]; then
            APP="build/ios/Release-iphoneos/Runner.app"
          fi
          if [ ! -d "$APP" ]; then
            echo "Runner.app not found." >&2
            exit 1
          fi

          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP" Payload/

          mkdir -p build/ios/ipa_unsigned
          zip -qr build/ios/ipa_unsigned/fireball_unsigned.ipa Payload
          rm -rf Payload

    artifacts:
      - build/ios/ipa_unsigned/fireball_unsigned.ipa

  fireball-ios-ipa:
    name: Fireball iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      # Must match the integration name in Codemagic → Team integrations → Developer Portal
      app_store_connect: fireball-asc

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fireball.fireball
      vars:
        # Marketing version (CFBundleShortVersionString), e.g. 2.1.0
        FLUTTER_BUILD_NAME: "3.0.0"
        # Optional: add APP_STORE_APPLE_ID in Codemagic → App → Environment variables
        # (numeric string, e.g. "1234567890") to bump build number from App Store Connect.
        # Do not define it here empty — Codemagic rejects empty vars.

    scripts:
      - name: Set up code signing on Xcode project
        script: xcode-project use-profiles

      - name: Install dependencies
        script: |
          set -e
          flutter pub get

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install

      - name: Flutter build IPA
        script: |
          set -e
          VERSION_NAME="${FLUTTER_BUILD_NAME:-3.0.0}"

          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST="$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)"
            BUILD_NUMBER=$((LATEST + 1))
          else
            BUILD_NUMBER="${CM_BUILD_NUMBER:-1}"
          fi

          flutter build ipa --release \
            --build-name="$VERSION_NAME" \
            --build-number="$BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    # Omit this entire `publishing` block if you only want the .ipa as a build artifact (no ASC upload).
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
